# OLake Slack Agent — full stack
#
# Services:
#   postgres   — hosted persistence (always on)
#   agent      — Slack webhook server
#   eval       — evaluation dashboard (optional, use --profile eval to include)
#
# Quick start:
#   docker compose up -d                    # postgres + agent
#   docker compose --profile eval up -d    # postgres + agent + eval dashboard
#
# The agent & eval containers read their config from .env at project root.
# Both services share the same named volumes so they read/write the same
# data/, logs/, and .github_repos/ directories.

x-common-env: &common-env
  env_file: .env
  # Override DATABASE_URL to use the compose service name as host
  environment:
    DATABASE_URL: postgresql://slack_agent:${POSTGRES_PASSWORD:-slack_agent_dev}@postgres:5432/slack_agent

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: slack_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slack_agent_dev}
      POSTGRES_DB: slack_agent
    ports:
      # 5433 on host → 5432 in container; avoids clashing with a local Postgres
      - "5433:5432"
    volumes:
      - slack_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slack_agent -d slack_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Slack Agent ─────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    restart: unless-stopped
    <<: *common-env
    ports:
      - "${WEBHOOK_PORT:-8001}:8001"
    volumes:
      # Persist DB, logs, and cloned repos across restarts / rebuilds
      - agent_data:/app/data
      - agent_logs:/app/logs
      - github_repos:/app/.github_repos
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

